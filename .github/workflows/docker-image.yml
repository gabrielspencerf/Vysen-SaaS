# Build da imagem e push para GHCR (ghcr.io) para o Portainer/Swarm puxar.
# Dispara em: push em main e em tags v* (ex.: v0.2.0).
#
# Versões das actions estão fixadas por subversão (não major) para reduzir o
# risco de supply-chain via tag mutável. Pin por SHA é o ideal a longo prazo;
# vamos lá quando o supply chain for crítico (assinatura provenance / SBOM).
name: Docker Image CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/gabrielspencerf/vysen-saas

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/app
      REDIS_URL: redis://127.0.0.1:6379
      SESSION_SECRET: ci-session-secret
      SEED_ADMIN_PASSWORD: ci-admin-password
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node
        uses: actions/setup-node@v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL
        run: npm run db:wait

      - name: Run migrations
        run: npm run db:migrate

      - name: Seed base data
        run: npm run db:seed

      - name: Seed synthetic conversations
        run: npm run db:seed:synthetic-conversations

      - name: Run CI verify
        run: npm run ci:verify

  build-and-push:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set image tags
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # release tag: publica só :vX.Y.Z (latest fica para main).
            VERSION="${GITHUB_REF#refs/tags/}"
            {
              echo "primary=$VERSION"
              echo "tags<<EOF"
              echo "${{ env.IMAGE_NAME }}:$VERSION"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            # main: publica :sha-xxxxxxx + :latest
            SHA_TAG="sha-${GITHUB_SHA::7}"
            {
              echo "primary=$SHA_TAG"
              echo "tags<<EOF"
              echo "${{ env.IMAGE_NAME }}:$SHA_TAG"
              echo "${{ env.IMAGE_NAME }}:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            # PR: build only, tag descartável
            SHA_TAG="pr-${GITHUB_SHA::7}"
            {
              echo "primary=$SHA_TAG"
              echo "tags<<EOF"
              echo "${{ env.IMAGE_NAME }}:$SHA_TAG"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3.7.1

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
